name: Preview Deploy

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  preview:
    name: Build & Deploy Preview
    runs-on: ubuntu-latest
    # Chỉ chạy khi có thay đổi frontend
    if: >
      contains(toJSON(github.event.pull_request.labels.*.name), 'preview') ||
      !contains(toJSON(github.event.pull_request.labels.*.name), 'skip-preview')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install & Build
        run: |
          npm ci
          npm run build

      - name: Deploy to Firebase Hosting Preview Channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_TANLE_DEV }}'
          projectId: tanle-dev
          target: lynstore
          # channelId tự tạo preview channel với tên pr-<number>
          channelId: 'pr-${{ github.event.pull_request.number }}'
          # Preview channel tự hết hạn sau 7 ngày
          expires: 7d
